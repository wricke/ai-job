<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>职途雷达 · AI 岗位匹配助手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-2: #eef3f7;
      --line: #dbe4ec;
      --text: #17202a;
      --muted: #657282;
      --accent: #116b5f;
      --blue: #2563eb;
      --good-bg: #dcfce7;
      --good-text: #166534;
      --warn-bg: #fef3c7;
      --warn-text: #92400e;
      --bad-bg: #fee2e2;
      --bad-text: #991b1b;
      font-family: Inter, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    button, input, select, textarea {
      font: inherit;
    }

    header {
      min-height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 11px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    main {
      padding: 20px 28px 28px;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 390px;
      gap: 18px;
      align-items: start;
    }

    section {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      min-height: 52px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
    }

    input[type="file"] {
      padding: 7px 10px;
    }

    textarea {
      resize: vertical;
      min-height: 156px;
      line-height: 1.5;
    }

    textarea[readonly] {
      background: #f8fafc;
    }

    .textarea-lg {
      min-height: 260px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      border-color: #aab7c4;
      background: #f8fafc;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.blue {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button:disabled {
      cursor: default;
      opacity: .55;
    }

    .hint, .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .hidden {
      display: none !important;
    }

    .auth-view {
      min-height: calc(100vh - 64px);
      padding: 48px 20px;
      display: grid;
      place-items: start center;
    }

    .auth-panel {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .auth-box {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .auth-box + .auth-box {
      border-left: 1px solid var(--line);
    }

    .score-panel {
      padding: 18px;
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .score {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 12px solid #cfe8e4;
      display: grid;
      place-items: center;
      background: #f8fffd;
      color: var(--accent);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .summary {
      color: var(--text);
      line-height: 1.7;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .report-card {
      padding: 16px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .recommendation-list {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .recommendation-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .recommendation-head {
      padding: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .recommendation-title {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .fit-score {
      min-width: 58px;
      min-height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 7px solid #cfe8e4;
      color: var(--accent);
      font-size: 18px;
      font-weight: 800;
    }

    .recommendation-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-block {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .mini-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      line-height: 1.7;
    }

    .tag-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: #344052;
      font-size: 12px;
    }

    .tag.good {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .tag.warn {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .status {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .status.ok {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .status.bad {
      background: var(--bad-bg);
      color: var(--bad-text);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfd;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
    }

    .empty {
      padding: 18px 16px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: min(440px, calc(100vw - 40px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 14px 32px rgba(15, 23, 42, .16);
      display: none;
      z-index: 20;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 1180px) {
      main {
        grid-template-columns: 1fr;
      }

      .grid-2, .mini-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      header {
        padding: 14px 16px;
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 14px 16px 20px;
      }

      .row, .score-panel, .auth-grid {
        grid-template-columns: 1fr;
      }

      .auth-box + .auth-box {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>职途雷达 · AI 岗位匹配助手</h1>
    <div class="header-right">
      <span class="pill"><span class="dot"></span><span id="statusText">体验版</span></span>
      <span class="pill hidden" id="userText">用户：-</span>
      <button id="logoutBtn" class="hidden" type="button">退出</button>
    </div>
  </header>

  <div id="authView" class="auth-view">
    <section class="auth-panel">
      <div class="section-head">
        <h2>登录后使用职途雷达</h2>
      </div>
      <div class="auth-grid">
        <div class="auth-box">
          <h3>登录</h3>
          <label>用户名
            <input id="loginUsername" autocomplete="username" value="demo">
          </label>
          <label>密码
            <input id="loginPassword" type="password" autocomplete="current-password" value="demo123">
          </label>
          <button id="loginBtn" class="primary" type="button">登录</button>
        </div>
        <div class="auth-box">
          <h3>注册</h3>
          <label>用户名
            <input id="registerUsername" autocomplete="username" placeholder="3 到 40 位">
          </label>
          <label>昵称
            <input id="registerDisplayName" placeholder="用于右上角显示">
          </label>
          <label>密码
            <input id="registerPassword" type="password" autocomplete="new-password" placeholder="至少 6 位">
          </label>
          <button id="registerBtn" class="blue" type="button">注册并登录</button>
        </div>
      </div>
    </section>
  </div>

  <main id="appView" class="hidden">
    <div class="stack">
      <section>
        <div class="section-head">
          <h2>分析对象</h2>
        </div>
        <div class="body">
          <label>简历
            <select id="resumeSelect"></select>
          </label>
          <label>推荐岗位
            <select id="jobSelect"></select>
          </label>
          <button id="recommendJobsBtn" class="blue" type="button">推荐岗位</button>
          <button id="startAnalysisBtn" class="primary" type="button">启动 Agent 分析</button>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>历史分析</h2>
          <button id="loadHistoryBtn" type="button">刷新</button>
        </div>
        <div id="historyBox"></div>
      </section>
    </div>

    <div class="stack">
      <section>
        <div class="section-head">
          <h2>岗位推荐</h2>
          <span id="recommendationStatus" class="status">等待中</span>
        </div>
        <div class="body">
          <div id="recommendationSummary" class="summary">选择或上传一份简历后，系统会推荐适合投递的岗位方向。</div>
          <div id="recommendationKeywords" class="tag-wrap"></div>
        </div>
        <div id="recommendationBox" class="recommendation-list">
          <div class="empty">暂无岗位推荐</div>
        </div>
        <div class="report-card">
          <h3>整体短板</h3>
          <ul id="recommendationGaps"></ul>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>分析报告</h2>
          <span id="analysisStatus" class="status">等待中</span>
        </div>
        <div class="score-panel">
          <div id="scoreBox" class="score">--</div>
          <div id="summaryBox" class="summary">选择一份简历和一个推荐岗位，然后启动 Agent 分析。</div>
        </div>
        <div class="grid-2">
          <div class="report-card">
            <h3>匹配技能</h3>
            <div id="matchedSkills" class="tag-wrap"></div>
          </div>
          <div class="report-card">
            <h3>待补强技能</h3>
            <div id="missingSkills" class="tag-wrap"></div>
          </div>
        </div>
        <div class="report-card">
          <h3>简历优化建议</h3>
          <ul id="suggestionsList"></ul>
        </div>
        <div class="report-card">
          <h3>面试准备问题</h3>
          <ul id="questionsList"></ul>
        </div>
        <div class="report-card">
          <h3>Agent 执行轨迹</h3>
          <div id="traceBox"></div>
        </div>
      </section>
    </div>

    <div class="stack">
      <section>
        <div class="section-head">
          <h2>上传简历</h2>
          <button id="fillResumeBtn" type="button">查看当前</button>
        </div>
        <div class="body">
          <label>简历文件
            <input id="resumeFile" type="file" accept=".txt,.pdf,.docx,.png,.jpg,.jpeg">
          </label>
          <div class="row">
            <label>标题
              <input id="resumeTitle" placeholder="不填则使用文件名">
            </label>
            <label>目标岗位
              <input id="targetRole" placeholder="例如 Java 后端开发实习生">
            </label>
          </div>
          <label>姓名
            <input id="ownerName" placeholder="候选人">
          </label>
          <label>解析结果预览
            <textarea id="resumeContent" class="textarea-lg" readonly placeholder="上传并解析成功后，这里会展示系统从简历中提取出的文字。"></textarea>
          </label>
          <div class="actions">
            <button id="uploadResumeBtn" class="blue" type="button">上传并解析简历</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const demoResume = `教育背景：计算机相关专业。
技能：Java、Spring Boot、Spring MVC、MyBatis、MySQL、Redis、RabbitMQ、Docker、Nacos、Git、Linux，了解 Python 和大模型应用。
项目经历：Nearby+ AI 本地生活服务平台，负责用户登录、商户展示、搜索评论、Feed 流推荐等功能。
基于 Spring Boot + Redis + MySQL + MQ + Docker + Nacos 构建，支持高并发场景下的缓存优化与异步处理。`;

    const state = {
      user: null,
      resumes: [],
      jobs: [],
      analyses: [],
      nextId: 1
    };

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function tagList(values, cls) {
      if (!values || values.length === 0) return `<span class="muted">暂无</span>`;
      return values.map((value) => `<span class="tag ${cls || ""}">${escapeHtml(value)}</span>`).join("");
    }

    function liList(values) {
      if (!values || values.length === 0) return `<li class="muted">暂无</li>`;
      return values.map((value) => `<li>${escapeHtml(value)}</li>`).join("");
    }

    function statusClass(status) {
      if (status === "COMPLETED" || status === "SUCCESS") return "ok";
      if (status === "FAILED") return "bad";
      return "";
    }

    function login(username) {
      const name = username || "demo";
      state.user = { username: name, displayName: name === "demo" ? "体验用户" : name };
      $("authView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("userText").textContent = `用户：${state.user.displayName}`;
      $("userText").classList.remove("hidden");
      $("logoutBtn").classList.remove("hidden");
      loadInitialData();
      renderAll();
    }

    function logout() {
      state.user = null;
      state.resumes = [];
      state.jobs = [];
      state.analyses = [];
      $("authView").classList.remove("hidden");
      $("appView").classList.add("hidden");
      $("userText").classList.add("hidden");
      $("logoutBtn").classList.add("hidden");
      showToast("已退出");
    }

    function loadInitialData() {
      const resume = {
        id: state.nextId++,
        title: "后端开发实习简历样例",
        ownerName: "候选人",
        targetRole: "Java 后端开发实习生",
        content: demoResume
      };
      state.resumes = [resume];
      state.jobs = [];
      state.analyses = [];
      clearUploadForm();
      clearRecommendation();
      clearReport();
    }

    function renderAll() {
      renderResumes();
      renderJobOptions([]);
      renderHistory();
    }

    function renderResumes(selectedId) {
      $("resumeSelect").innerHTML = state.resumes.length
        ? state.resumes.map((resume) => `<option value="${resume.id}">${escapeHtml(resume.title)}</option>`).join("")
        : `<option value="">请先上传简历</option>`;
      if (selectedId) $("resumeSelect").value = String(selectedId);
    }

    function renderJobOptions(jobs, selectedId) {
      $("jobSelect").innerHTML = jobs.length
        ? jobs.map((job) => `<option value="${job.id}">${escapeHtml(job.title)}</option>`).join("")
        : `<option value="">先根据简历推荐岗位</option>`;
      if (selectedId) $("jobSelect").value = String(selectedId);
    }

    function currentResume() {
      const id = Number($("resumeSelect").value);
      return state.resumes.find((resume) => resume.id === id) || state.resumes[0];
    }

    function currentJob() {
      const id = Number($("jobSelect").value);
      return state.jobs.find((job) => job.id === id);
    }

    function fillCurrentResume() {
      const resume = currentResume();
      if (!resume) return;
      $("resumeTitle").value = resume.title || "";
      $("ownerName").value = resume.ownerName || "";
      $("targetRole").value = resume.targetRole || "";
      $("resumeContent").value = resume.content || "";
    }

    function clearUploadForm() {
      $("resumeFile").value = "";
      $("resumeTitle").value = "";
      $("ownerName").value = "";
      $("targetRole").value = "";
      $("resumeContent").value = "";
    }

    function clearRecommendation() {
      $("recommendationStatus").textContent = "等待中";
      $("recommendationStatus").className = "status";
      $("recommendationSummary").textContent = "选择或上传一份简历后，系统会推荐适合投递的岗位方向。";
      $("recommendationKeywords").innerHTML = "";
      $("recommendationBox").innerHTML = `<div class="empty">暂无岗位推荐</div>`;
      $("recommendationGaps").innerHTML = liList([]);
      state.jobs = [];
      renderJobOptions([]);
    }

    function clearReport() {
      $("analysisStatus").textContent = "等待中";
      $("analysisStatus").className = "status";
      $("scoreBox").textContent = "--";
      $("summaryBox").textContent = "选择一份简历和一个推荐岗位，然后启动 Agent 分析。";
      $("matchedSkills").innerHTML = tagList([]);
      $("missingSkills").innerHTML = tagList([]);
      $("suggestionsList").innerHTML = liList([]);
      $("questionsList").innerHTML = liList([]);
      $("traceBox").innerHTML = `<span class="muted">暂无轨迹</span>`;
    }

    function resumeSkills(text) {
      const rules = [
        ["Java", /java/i],
        ["Spring Boot", /spring\s*boot|springboot/i],
        ["MyBatis", /mybatis/i],
        ["MySQL", /mysql|数据库|sql/i],
        ["Redis", /redis|缓存/i],
        ["RabbitMQ", /rabbitmq|消息队列|mq/i],
        ["Docker", /docker/i],
        ["Nacos", /nacos/i],
        ["Linux", /linux/i],
        ["Git", /git/i],
        ["AI Agent", /agent|大模型|ai|llm/i]
      ];
      return rules.filter(([, reg]) => reg.test(text || "")).map(([skill]) => skill);
    }

    async function uploadResume() {
      const file = $("resumeFile").files[0];
      if (!file) {
        showToast("请先选择简历文件");
        return;
      }
      const button = $("uploadResumeBtn");
      button.disabled = true;
      button.textContent = "解析中";
      try {
        let content = demoResume;
        if (file.name.toLowerCase().endsWith(".txt")) {
          content = await file.text();
        }
        const title = $("resumeTitle").value.trim() || file.name.replace(/\.[^.]+$/, "");
        const resume = {
          id: state.nextId++,
          title,
          ownerName: $("ownerName").value.trim() || "候选人",
          targetRole: $("targetRole").value.trim() || "后端开发实习生",
          content
        };
        state.resumes = state.resumes.filter((item) => item.content !== resume.content);
        state.resumes.unshift(resume);
        renderResumes(resume.id);
        fillCurrentResume();
        clearRecommendation();
        clearReport();
        $("resumeFile").value = "";
        showToast("简历已上传并解析");
      } finally {
        button.disabled = false;
        button.textContent = "上传并解析简历";
      }
    }

    function recommendJobs() {
      const resume = currentResume();
      if (!resume) {
        showToast("请先上传或选择简历");
        return;
      }
      const button = $("recommendJobsBtn");
      button.disabled = true;
      button.textContent = "推荐中";
      $("recommendationStatus").textContent = "分析中";
      $("recommendationSummary").textContent = "正在根据简历生成岗位方向和适配度。";
      $("recommendationBox").innerHTML = `<div class="empty">推荐生成中，请稍等</div>`;
      window.setTimeout(() => {
        const skills = resumeSkills(resume.content);
        const hasAi = skills.includes("AI Agent");
        const jobs = [
          {
            id: state.nextId++,
            title: "Java 后端开发实习生",
            score: 91,
            level: "高",
            matched: skills.filter((item) => ["Java", "Spring Boot", "MyBatis", "MySQL", "Redis", "Git"].includes(item)),
            missing: ["接口压测", "线上排障", "事务一致性"],
            keywords: ["Java 后端 实习", "Spring Boot 实习", "后端开发 校招"],
            reasons: ["简历中的 Java Web 技术栈完整", "项目包含接口、缓存、数据库和异步处理表达", "适合后端实习常见岗位画像"]
          },
          {
            id: state.nextId++,
            title: "微服务开发实习生",
            score: 84,
            level: "中高",
            matched: skills.filter((item) => ["Java", "Spring Boot", "Redis", "RabbitMQ", "Docker", "Nacos"].includes(item)),
            missing: ["服务治理", "链路追踪", "限流降级"],
            keywords: ["微服务 实习", "Java 微服务", "Spring Cloud 实习"],
            reasons: ["项目中出现 Nacos、Docker、消息队列等微服务相关信号", "可以围绕服务拆分和异步任务准备项目追问"]
          },
          {
            id: state.nextId++,
            title: hasAi ? "AI 应用开发实习生" : "软件开发实习生",
            score: hasAi ? 79 : 76,
            level: "中",
            matched: hasAi ? ["AI Agent", ...skills.slice(0, 4)] : skills.slice(0, 5),
            missing: hasAi ? ["RAG", "Prompt 评测", "向量数据库"] : ["数据结构", "计算机网络", "代码规范"],
            keywords: hasAi ? ["AI 应用开发 实习", "大模型应用 实习", "Agent 开发"] : ["软件开发 实习", "研发实习", "工程实习"],
            reasons: hasAi ? ["简历中有大模型或 Agent 项目信号", "适合把业务系统和 AI 能力结合展示"] : ["通用开发岗位对技术栈包容度高", "适合作为后端岗位之外的补充投递方向"]
          }
        ];
        state.jobs = jobs;
        renderJobOptions(jobs, jobs[0].id);
        renderRecommendations(jobs);
        clearReport();
        button.disabled = false;
        button.textContent = "推荐岗位";
        showToast("岗位推荐已生成");
      }, 650);
    }

    function renderRecommendations(jobs) {
      $("recommendationStatus").textContent = "已完成";
      $("recommendationStatus").className = "status ok";
      $("recommendationSummary").textContent = "已根据简历生成推荐岗位，可以选择其中一个岗位继续分析。";
      $("recommendationKeywords").innerHTML = tagList([...new Set(jobs.flatMap((job) => job.keywords))]);
      $("recommendationGaps").innerHTML = liList(["补充项目量化结果", "准备数据库、缓存、接口设计和异常处理追问", "把技术方案和业务收益讲清楚"]);
      $("recommendationBox").innerHTML = jobs.map((job) => `
        <article class="recommendation-card">
          <div class="recommendation-head">
            <div>
              <h3 class="recommendation-title">${escapeHtml(job.title)}</h3>
              <div class="muted">适配等级：${escapeHtml(job.level)}</div>
            </div>
            <div class="fit-score">${job.score}</div>
          </div>
          <div class="recommendation-body">
            <div class="mini-block">
              <div class="mini-title">推荐理由</div>
              <ul>${liList(job.reasons)}</ul>
            </div>
            <div class="mini-grid">
              <div class="mini-block">
                <div class="mini-title">已匹配</div>
                <div class="tag-wrap">${tagList(job.matched, "good")}</div>
              </div>
              <div class="mini-block">
                <div class="mini-title">待补强</div>
                <div class="tag-wrap">${tagList(job.missing, "warn")}</div>
              </div>
            </div>
            <div class="mini-block">
              <div class="mini-title">搜索关键词</div>
              <div class="tag-wrap">${tagList(job.keywords)}</div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function startAnalysis() {
      const resume = currentResume();
      const job = currentJob();
      if (!resume || !job) {
        showToast("请先选择简历，并生成一个推荐岗位");
        return;
      }
      const button = $("startAnalysisBtn");
      button.disabled = true;
      $("analysisStatus").textContent = "分析中";
      $("summaryBox").textContent = "Agent 正在分析中，请稍等。";
      window.setTimeout(() => {
        $("analysisStatus").textContent = "已完成";
        $("analysisStatus").className = "status ok";
        $("scoreBox").textContent = job.score;
        $("summaryBox").textContent = `当前简历与「${job.title}」匹配度 ${job.score} 分。优势集中在 ${job.matched.slice(0, 3).join("、")}，建议继续补强 ${job.missing.slice(0, 2).join("、")}。`;
        $("matchedSkills").innerHTML = tagList(job.matched, "good");
        $("missingSkills").innerHTML = tagList(job.missing, "warn");
        $("suggestionsList").innerHTML = liList([
          "把项目描述改成：业务背景 -> 技术方案 -> 结果指标。",
          "为核心项目准备 1 个能讲 3 分钟的技术难点。",
          "在项目中补充接口耗时、缓存命中率、并发量等量化表达。"
        ]);
        $("questionsList").innerHTML = liList([
          "你的项目为什么要使用 Redis，如何处理缓存穿透或缓存击穿？",
          "如果接口响应变慢，你会如何定位问题？",
          "消息队列在项目中解决了什么问题，如何保证消费可靠性？"
        ]);
        $("traceBox").innerHTML = `
          <table>
            <thead><tr><th>Agent</th><th>状态</th><th>耗时</th></tr></thead>
            <tbody>
              ${["ResumeParserAgent", "JobRecommendationAgent", "MatchScoringAgent", "SuggestionAgent", "InterviewAgent"].map((name, index) => `
                <tr>
                  <td>${name}</td>
                  <td><span class="status ok">成功</span></td>
                  <td class="mono">${260 + index * 80} ms</td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
        const analysis = {
          id: state.nextId++,
          status: "COMPLETED",
          score: job.score,
          time: new Date().toLocaleString("zh-CN", { hour12: false })
        };
        state.analyses.unshift(analysis);
        renderHistory();
        button.disabled = false;
        showToast("分析报告已生成");
      }, 700);
    }

    function renderHistory() {
      if (state.analyses.length === 0) {
        $("historyBox").innerHTML = `<div class="empty">暂无分析记录</div>`;
        return;
      }
      $("historyBox").innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>状态</th><th>分数</th><th>时间</th></tr></thead>
          <tbody>
            ${state.analyses.map((item) => `
              <tr>
                <td class="mono">${item.id}</td>
                <td><span class="status ${statusClass(item.status)}">已完成</span></td>
                <td>${item.score}</td>
                <td class="mono">${item.time}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    $("loginBtn").addEventListener("click", () => login($("loginUsername").value.trim()));
    $("registerBtn").addEventListener("click", () => {
      const username = $("registerUsername").value.trim();
      if (!username || $("registerPassword").value.length < 6) {
        showToast("请输入用户名和至少 6 位密码");
        return;
      }
      login($("registerDisplayName").value.trim() || username);
      showToast("注册成功");
    });
    $("logoutBtn").addEventListener("click", logout);
    $("fillResumeBtn").addEventListener("click", fillCurrentResume);
    $("uploadResumeBtn").addEventListener("click", () => uploadResume().catch((error) => showToast(error.message)));
    $("recommendJobsBtn").addEventListener("click", recommendJobs);
    $("startAnalysisBtn").addEventListener("click", startAnalysis);
    $("loadHistoryBtn").addEventListener("click", renderHistory);
    $("resumeSelect").addEventListener("change", () => {
      clearRecommendation();
      clearReport();
    });
    $("resumeFile").addEventListener("change", () => {
      const file = $("resumeFile").files[0];
      if (!file) return;
      $("resumeTitle").value = file.name.replace(/\.[^.]+$/, "");
    });
    $("loginPassword").addEventListener("keydown", (event) => {
      if (event.key === "Enter") login($("loginUsername").value.trim());
    });
  </script>
</body>
</html>
