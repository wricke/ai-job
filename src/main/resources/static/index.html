<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>职途雷达 · 登录</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/app.js" defer></script>
</head>
<body data-page="auth">
  <main class="auth-page">
    <section class="auth-shell" aria-label="职途雷达账号入口">
      <div class="auth-art">
        <div class="brand-mark">职途雷达</div>
        <h1>把简历、岗位和面试准备整理成清晰的求职路线。</h1>
        <p>上传简历后，系统会根据真实岗位方向生成推荐、匹配评分、简历优化建议和面试准备内容。</p>
        <div class="report-preview" aria-hidden="true">
          <div class="score-ring">82</div>
          <div class="preview-lines">
            <span style="width: 88%"></span>
            <span style="width: 70%"></span>
            <span style="width: 58%"></span>
          </div>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="账号入口">
          <button id="loginTab" class="auth-tab active" type="button" role="tab" aria-selected="true">登录</button>
          <button id="registerTab" class="auth-tab" type="button" role="tab" aria-selected="false">注册</button>
        </div>

        <div id="loginBox" class="auth-box">
          <h2>登录</h2>
          <label>用户名
            <input id="loginUsername" autocomplete="username" placeholder="请输入用户名" required minlength="3" maxlength="40" aria-describedby="loginUsernameError">
            <span id="loginUsernameError" class="field-error" aria-live="polite"></span>
          </label>
          <label>密码
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码" required minlength="6" maxlength="120" aria-describedby="loginPasswordError">
            <span id="loginPasswordError" class="field-error" aria-live="polite"></span>
          </label>
          <button id="loginBtn" class="primary wide" type="button">登录</button>
        </div>

        <div id="registerBox" class="auth-box hidden">
          <h2>注册</h2>
          <label>用户名
            <input id="registerUsername" autocomplete="username" placeholder="3 到 40 位" required minlength="3" maxlength="40" aria-describedby="registerUsernameError">
            <span id="registerUsernameError" class="field-error" aria-live="polite"></span>
          </label>
          <label>密码
            <input id="registerPassword" type="password" autocomplete="new-password" placeholder="至少 6 位" required minlength="6" maxlength="120" aria-describedby="registerPasswordError">
            <span id="registerPasswordError" class="field-error" aria-live="polite"></span>
          </label>
          <button id="registerBtn" class="blue wide" type="button">注册并登录</button>
        </div>

        <div class="auth-foot">
          <span class="status-dot" id="healthDot"></span>
          <span id="healthText">检测服务中</span>
        </div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
