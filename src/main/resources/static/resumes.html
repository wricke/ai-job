<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>职途雷达 · 简历</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/app.js" defer></script>
</head>
<body data-page="resumes">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="side-brand">
        <strong>职途雷达</strong>
        <span>AI 岗位匹配助手</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <a href="/dashboard.html" data-nav="dashboard">工作台</a>
        <a href="/resumes.html" data-nav="resumes">简历</a>
        <a href="/recommendations.html" data-nav="recommendations">岗位推荐</a>
        <a href="/analyses.html" data-nav="analyses">分析报告</a>
      </nav>
      <div class="side-footer">
        <div class="service-chip"><span class="status-dot" id="healthDot"></span><span id="healthText">检测中</span></div>
        <div class="user-chip" id="userText">用户：-</div>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="page-title">
          <h1>简历</h1>
          <p>上传 PDF、DOCX 或 TXT 简历，系统会保存解析后的文本，供推荐和分析使用。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </div>

      <section class="grid cols-main">
        <div class="panel">
          <div class="panel-head">
            <h2>上传简历</h2>
          </div>
          <div class="panel-body">
            <label>简历文件
              <input id="resumeFile" type="file" accept=".txt,.pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain">
            </label>
            <div class="form-row">
              <label>标题
                <input id="resumeTitle" placeholder="不填则使用文件名">
              </label>
              <label>目标岗位
                <input id="targetRole" placeholder="请输入目标岗位">
              </label>
            </div>
            <label>姓名
              <input id="ownerName" placeholder="可选">
            </label>
            <div class="actions">
              <button id="uploadResumeBtn" class="primary" type="button">上传并解析</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>我的简历</h2>
            <span id="resumeTotal" class="status">--</span>
          </div>
          <div id="resumeList" class="panel-body"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>解析文本预览</h2>
          <span id="resumePreviewTitle" class="status">未选择</span>
        </div>
        <div id="resumePreview" class="panel-body preview-box">选择一份简历后，这里会展示系统解析出的文字。</div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
