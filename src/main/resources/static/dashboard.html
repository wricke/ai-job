<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>职途雷达 · 工作台</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/app.js" defer></script>
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="side-brand">
        <strong>职途雷达</strong>
        <span>AI 岗位匹配助手</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <a href="/dashboard.html" data-nav="dashboard">工作台</a>
        <a href="/resumes.html" data-nav="resumes">简历</a>
        <a href="/recommendations.html" data-nav="recommendations">岗位推荐</a>
        <a href="/analyses.html" data-nav="analyses">分析报告</a>
      </nav>
      <div class="side-footer">
        <div class="service-chip"><span class="status-dot" id="healthDot"></span><span id="healthText">检测中</span></div>
        <div class="user-chip" id="userText">用户：-</div>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="page-title">
          <h1>工作台</h1>
          <p>把求职流程拆成清晰步骤：先整理简历，再生成岗位推荐，最后查看匹配报告。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </div>

      <section class="hero-panel">
        <div>
          <h2>今天从一份简历开始</h2>
          <p>上传简历后，系统会提取核心技能、项目信号和目标方向，再辅助生成岗位推荐与面试准备内容。</p>
        </div>
        <div class="quick-actions">
          <a class="button-link primary" href="/resumes.html">上传简历</a>
          <a class="button-link" href="/recommendations.html">生成推荐</a>
        </div>
      </section>

      <section class="grid stats">
        <div class="stat-card">
          <span>简历数量</span>
          <strong id="resumeCount">--</strong>
        </div>
        <div class="stat-card">
          <span>推荐岗位</span>
          <strong id="jobCount">--</strong>
        </div>
        <div class="stat-card">
          <span>分析记录</span>
          <strong id="analysisCount">--</strong>
        </div>
        <div class="stat-card">
          <span>最近评分</span>
          <strong id="latestScore">--</strong>
        </div>
      </section>

      <section class="grid cols-main">
        <div class="panel">
          <div class="panel-head">
            <h2>最近分析</h2>
            <a class="button-link" href="/analyses.html">查看全部</a>
          </div>
          <div id="dashboardHistory" class="panel-body"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>简历概览</h2>
            <a class="button-link" href="/resumes.html">管理简历</a>
          </div>
          <div id="dashboardResumes" class="panel-body"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
