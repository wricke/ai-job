<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>职途雷达 · 岗位推荐</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="/assets/app.js" defer></script>
</head>
<body data-page="recommendations">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="side-brand">
        <strong>职途雷达</strong>
        <span>AI 岗位匹配助手</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <a href="/dashboard.html" data-nav="dashboard">工作台</a>
        <a href="/resumes.html" data-nav="resumes">简历</a>
        <a href="/recommendations.html" data-nav="recommendations">岗位推荐</a>
        <a href="/analyses.html" data-nav="analyses">分析报告</a>
      </nav>
      <div class="side-footer">
        <div class="service-chip"><span class="status-dot" id="healthDot"></span><span id="healthText">检测中</span></div>
        <div class="user-chip" id="userText">用户：-</div>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="page-title">
          <h1>岗位推荐</h1>
          <p>选择一份简历，生成适合投递的岗位方向，并保存为后续匹配分析可用的岗位。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>推荐设置</h2>
          <span id="recommendationStatus" class="status">等待中</span>
        </div>
        <div class="panel-body">
          <div class="form-row">
            <label>选择简历
              <select id="recommendResumeSelect"></select>
            </label>
            <label>已保存岗位
              <select id="savedJobSelect"></select>
            </label>
          </div>
          <div class="actions">
            <button id="generateRecommendationsBtn" class="primary" type="button">生成岗位推荐</button>
            <a class="button-link" href="/analyses.html">去做匹配分析</a>
          </div>
        </div>
      </section>

      <section class="grid cols-main">
        <div class="panel">
          <div class="panel-head">
            <h2>推荐结果</h2>
          </div>
          <div class="panel-body">
            <div id="recommendationSummary" class="summary">生成后，这里会展示岗位方向、推荐理由、技能匹配和准备建议。</div>
            <div id="recommendationKeywords" class="tag-wrap"></div>
            <div id="recommendationBox" class="recommendation-list"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>整体短板</h2>
          </div>
          <div class="panel-body">
            <ul id="recommendationGaps" class="list"></ul>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
