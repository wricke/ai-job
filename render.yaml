services:
  - type: web
    name: ai-job-java
    runtime: java
    plan: free
    buildCommand: bash ./mvnw -DskipTests package
    startCommand: java -jar target/ai-job-agent-0.0.1-SNAPSHOT.jar --spring.profiles.active=render --server.port=$PORT
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: DEEPSEEK_API_KEY
        sync: false
