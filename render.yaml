services:
  - type: web
    name: ai-job-java
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MYSQL_URL
        sync: false
      - key: MYSQL_USERNAME
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
